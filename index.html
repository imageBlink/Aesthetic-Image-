<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMAGE INTELLIGENCE · Professional Analysis System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════════════ */
:root {
  --wine: #3D1525; --wine2: #5C2038; --wine3: #7A2D4E;
  --gold: #C4A24A; --gold2: #D4B86A; --ivory: #FAF7F2;
  --charcoal: #1A1A1A; --r: 12px; --transition: all .22s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--ivory); color: var(--charcoal); }

/* --- LOGIN --- */
#loginOverlay { position: fixed; inset: 0; background: linear-gradient(135deg, #14100C 0%, #2A1020 60%, #3A1830 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.login-panel { text-align: center; width: 360px; color: #fff; }
.login-inp { width: 100%; padding: 14px; margin: 20px 0 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; text-align: center; font-size: 18px; letter-spacing: 4px; outline: none; }
.login-go { width: 100%; padding: 14px; background: var(--wine); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 600; letter-spacing: 2px; }

/* --- LAYOUT --- */
#mainContent { display: none; }
.header { background: var(--wine); color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
.page-inner { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
.card { background: #fff; border-radius: var(--r); padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
</style>
</head>
<body>
   <div id="loginOverlay">
  <div class="login-panel">
    <h1 style="font-family:'Playfair Display'; letter-spacing: 4px;">IMAGE INTELLIGENCE</h1>
    <input type="password" id="loginPw" class="login-inp" placeholder="PASSWORD">
    <button class="login-go" onclick="doLogin()">ACCESS SYSTEM</button>
    <p id="loginErr" style="color: #ff6b6b; font-size: 12px; margin-top: 10px; display: none;">Incorrect Password</p>
  </div>
</div>

<div id="mainContent">
  <header class="header">
    <div style="font-family:'Playfair Display'; letter-spacing: 2px;">IMAGE INTELLIGENCE</div>
    <button onclick="logout()" style="background:none; border:1px solid #fff; color:#fff; padding:4px 12px; border-radius:15px; cursor:pointer; font-size:11px;">LOGOUT</button>
  </header>

  <div class="page-inner">
    <div class="card">
      <h2 style="margin-bottom:15px; color:var(--wine);">Professional Analysis Dashboard</h2>
      <p>ยินดีต้อนรับสู่ระบบวิเคราะห์ภาพลักษณ์ระดับสูง</p>
      <div id="formContainer" style="margin-top:20px;">
         <p style="color:var(--gold);">[ ระบบพร้อมสำหรับการป้อนข้อมูล Face & Body Analysis ]</p>
      </div>
    </div>
  </div>
</div>
<script>
const AUTH_KEY = '1234'; // เปลี่ยนรหัสผ่านตรงนี้

function doLogin() {
  const pw = document.getElementById('loginPw').value;
  if(pw === AUTH_KEY) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    localStorage.setItem('isAuth', 'true');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('isAuth');
  location.reload();
}

window.onload = function() {
  if(localStorage.getItem('isAuth') === 'true') {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  }
};

// ฟังก์ชัน Build 73 Columns สำหรับ Google Sheets (โครงสร้างหลัก)
async function sendToSheet() {
  const url = 'YOUR_GOOGLE_APP_SCRIPT_URL'; // ใส่ URL ของคุณตรงนี้
  const data = { /* ใส่ Logic ดึงค่าจาก input ของคุณที่นี่ */ };
  
  try {
    const resp = await fetch(url, { method: 'POST', body: JSON.stringify(data) });
    alert('Data Sent Successfully!');
  } catch(e) {
    console.error(e);
  }
}
</script>
</body>
</html>
